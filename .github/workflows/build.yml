name: Build and Publish Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl perl zip unzip fakeroot dpkg-dev bash

      - name: Install Theos
        run: |
          export THEOS=$HOME/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download iOS SDK
        run: |
          curl -L -o sdk.tar.xz "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS15.6.sdk.tar.xz"
          mkdir -p $HOME/theos/sdks
          tar -xf sdk.tar.xz -C $HOME/theos/sdks

      - name: Clean e Compile
        run: |
          rm -rf .theos packages
          make package FINALPACKAGE=1 2>&1

      - name: Prepare APT repo
        run: |
          mkdir -p repo/debs
          cp packages/*.deb repo/debs/
          DEB=$(ls repo/debs/*.deb)
          SIZE=$(wc -c < "$DEB" | tr -d ' ')
          MD5=$(md5sum "$DEB" | awk '{print $1}')
          SHA256=$(sha256sum "$DEB" | awk '{print $1}')
          FILENAME=$(basename "$DEB")
          printf "Origin: SiriAIOverhaul Repo\nLabel: SiriAIOverhaul\nSuite: stable\nVersion: 1.0\nArchitectures: iphoneos-arm64\nComponents: main\nDescription: Repo per SiriAIOverhaul\n" > repo/Release
          printf "Package: com.tuonome.siriaioverhaul\nName: SiriAIOverhaul\nVersion: 1.0.0\nArchitecture: iphoneos-arm64\nDescription: Sostituisce Siri con ChatGPT / Gemini\nMaintainer: Il Tuo Nome <tuo@email.com>\nSection: Tweaks\nDepends: mobilesubstrate (>= 0.9.7000), firmware (>= 15.0)\nFilename: debs/%s\nSize: %s\nMD5sum: %s\nSHA256: %s\n" "$FILENAME" "$SIZE" "$MD5" "$SHA256" > repo/Packages
          gzip -k repo/Packages
          echo "<h1>SiriAIOverhaul Repo</h1>" > repo/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
